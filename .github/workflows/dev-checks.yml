name: dev-checks

# Dev CI: ERC, DRC, BOM completeness check, plus schematic PDF + assembly
# drawings as artifacts. Runs on dev-* pushes and on PRs into dev and main
# (feature -> dev -> main flow; see docs/RELEASE_STRATEGY.md).
#
# Gating is off during bring-up (ENFORCE=false): checks run and upload their
# reports, but do not fail the job — the first run captures the Phase 0 baseline.
# Flip ENFORCE to "true" (and add these as required status checks in the dev/main
# rulesets) once the baseline is triaged.

on:
  push:
    branches: ['dev-*']
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

# Cancel superseded runs of the same event on the same ref (stops rapid pushes
# from stacking runs). Push and pull_request stay in separate groups so a PR
# check is never cancelled by its branch's push run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # for the "Publish docs" step (force-pushes a ci-docs branch)

jobs:
  dev-checks:
    runs-on: ubuntu-latest
    container:
      # Pinned in-house CI image: INTI-CMNB kicad10_auto + PyMuPDF (for framed
      # drill maps). Pinned tag (not :latest) keeps CI output reproducible.
      image: ghcr.io/ringof/kicad-ci:10-20260704
      options: --user root
    env:
      HOME: /root
      ENFORCE: "false"   # bring-up mode; set "true" to gate on ERC/DRC/BOM
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ERC / DRC / BOM checks + generate drawings
        run: |
          chmod +x scripts/run_checks.sh
          scripts/run_checks.sh

      - name: Upload reports and drawings
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dev-checks-reports
          path: reports/
          if-no-files-found: warn

      # Publish the built reports to a throwaway `ci-docs` branch (single
      # force-pushed commit, no history bloat). Actions artifacts live on a
      # storage host that some sandboxes can't reach; a git branch is fetchable
      # anywhere (git fetch / raw.githubusercontent.com). Purely a convenience
      # for reviewing CI output without downloading the artifact zip.
      - name: Publish docs to ci-docs branch
        # Only the push-event run publishes (two dev-checks runs fire per commit;
        # push + pull_request). continue-on-error so this convenience step can
        # never gate CI.
        if: always() && github.event_name == 'push'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          [ -d reports ] || { echo "no reports/ to publish"; exit 0; }
          WS="$(pwd)"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          PUB="$(mktemp -d)"
          # Commit onto the EXISTING ci-docs (continuous history, normal push)
          # rather than force-pushing a fresh orphan branch. Force-pushing an
          # unrelated history intermittently trips GitHub's "fatal error in
          # commit_refs"; a plain fast-forward push (like any branch push) does
          # not. Fall back to creating the branch if it doesn't exist yet.
          if git clone --depth 1 --branch ci-docs "$REMOTE" "$PUB" 2>/dev/null; then
            cd "$PUB"; git rm -rqf . >/dev/null 2>&1 || true
          else
            cd "$PUB"; git init -q; git checkout -qb ci-docs
          fi
          cp -r "$WS/reports/." .
          printf 'CI docs for %s\n\nSource: %s @ %s\nRun: %s/%s/actions/runs/%s\n' \
            "$GITHUB_REF_NAME" "$GITHUB_REF_NAME" "$GITHUB_SHA" \
            "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" > README.md
          git -c user.name=ci-bot -c user.email=ci-bot@users.noreply.github.com add -A
          git -c user.name=ci-bot -c user.email=ci-bot@users.noreply.github.com \
            commit -qm "dev-checks docs: ${GITHUB_REF_NAME} @ ${GITHUB_SHA}" \
            || { echo "no doc changes to publish"; exit 0; }
          ok=0
          for attempt in 1 2 3 4 5; do
            if git push "$REMOTE" HEAD:ci-docs; then ok=1; break; fi
            echo "ci-docs push attempt $attempt failed; retrying..."; sleep $((attempt * 4))
          done
          [ "$ok" = 1 ] || { echo "ci-docs publish failed after retries"; exit 1; }
          echo "Published to ci-docs: raw.githubusercontent.com/${GITHUB_REPOSITORY}/ci-docs/docs/"
