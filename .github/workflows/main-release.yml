name: main-release

# Full fabrication/design package + GitHub Release, with build-time revision
# and git-hash injection.
#
# Runs on every merge to main (and can be dispatched manually). A new revision
# is published ONLY when a design file changed since the last release; docs / CI
# / script-only merges are a no-op. GIT_HASH is stamped from the last commit
# that touched a design file, so it stays truthful and stable across doc-only
# commits. See docs/RELEASE_STRATEGY.md.
#
# Dispatch with dry_run=true to build the full turnkey package and upload it as
# run artifacts WITHOUT publishing a release — for validating the pipeline
# (e.g. the KiBot build) before committing to a real release.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      revision:
        description: "Force-publish this revision letter (blank = automatic)"
        required: false
        default: ""
      dry_run:
        description: "Build the package + upload as run artifacts, but do NOT publish a release"
        type: boolean
        required: false
        default: false

concurrency:
  group: main-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      revision: ${{ steps.rev.outputs.revision }}
      githash: ${{ steps.rev.outputs.githash }}
      publish: ${{ steps.rev.outputs.publish }}
      build: ${{ steps.rev.outputs.build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Determine revision & whether to publish
        id: rev
        env:
          GH_TOKEN: ${{ github.token }}
          OVERRIDE: ${{ github.event.inputs.revision }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          # Design files — changes here (and only here) trigger an uprev.
          # Docs, workflows, scripts, and *.kicad_prl (UI state) do not.
          DESIGN=('*.kicad_sch' '*.kicad_pcb' '*.kicad_pro' '*.kicad_dru'
                  '*.kicad_sym' 'library/' 'fp-lib-table' 'sym-lib-table')

          # GIT_HASH = last commit that touched a design file, so the stamp
          # always names the commit that defines the released design and does
          # not drift on doc-only commits.
          githash=$(git log -1 --format=%h -- "${DESIGN[@]}")

          latest=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 \
                     --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          # Compute revision + publish once (no early exits), so the dry-run
          # override below can adjust the decision uniformly.
          changed=""
          if [ -n "${OVERRIDE:-}" ]; then
            revision="$OVERRIDE"; publish=true
            reason="Manual override → rev$revision"
          elif [ -z "$latest" ]; then
            revision="A"; publish=true
            reason="No prior release → Rev A"
          else
            base=$(git rev-list -1 "$latest")
            changed=$(git diff --name-only "$base"..HEAD -- "${DESIGN[@]}" || true)
            letter="${latest#rev}"
            if [ -n "$changed" ]; then
              revision=$(python3 -c "print(chr(ord('${letter}'[-1]) + 1))"); publish=true
              reason="Design changed since $latest → rev$revision"
            else
              revision="$letter"; publish=false
              reason="No design changes since $latest → no new release (docs / CI-only merge)"
            fi
          fi

          # By default the build job runs exactly when we publish.
          build="$publish"

          # Dry run: build the package + upload artifacts for inspection, but
          # never publish a release. Forces a build even when there is no design
          # change, so the turnkey pipeline can be exercised on demand.
          if [ "${DRY_RUN:-false}" = "true" ]; then
            publish=false
            build=true
            [ -n "$revision" ] || revision="DRYRUN"
            reason="DRY RUN → build package for rev${revision}, skip publish"
          fi

          {
            echo "revision=$revision"
            echo "githash=$githash"
            echo "publish=$publish"
            echo "build=$build"
          } >> "$GITHUB_OUTPUT"

          echo "$reason (design commit $githash)." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$changed" ]; then
            { echo '```'; echo "$changed"; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.build == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/inti-cmnb/kicad10_auto:latest
      options: --user root
    env:
      HOME: /root
      REVISION: ${{ needs.prepare.outputs.revision }}
      GIT_HASH: ${{ needs.prepare.outputs.githash }}
    steps:
      - uses: actions/checkout@v6
      - name: Build fab/design package
        run: |
          chmod +x scripts/build_release.sh
          scripts/build_release.sh
      - uses: actions/upload-artifact@v6
        with:
          name: release-package
          path: out/

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-package
          path: out
      - name: Package release assets
        run: |
          set -euo pipefail
          # Stable asset names (no rev/hash) so /releases/latest/download/<name>
          # links stay valid across revisions. Paths follow the KiBot output
          # dirs (docs/, JLCPCB/gerbers/) — see usb3_fiber.kibot.yaml.
          cp out/docs/usb3_fiber-schematic.pdf usb3_fiber-schematic.pdf
          ( cd out/JLCPCB/gerbers && zip -qr ../../../usb3_fiber-gerbers.zip . )
          ( cd out && zip -qr ../usb3_fiber-fabrication.zip . )
          ls -la
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REV: ${{ needs.prepare.outputs.revision }}
          SHA: ${{ needs.prepare.outputs.githash }}
        run: |
          set -euo pipefail
          FILES=(usb3_fiber-fabrication.zip usb3_fiber-gerbers.zip usb3_fiber-schematic.pdf)
          NOTES="Fabrication and design package for revision ${REV} (design commit ${SHA}). Auto-generated by main-release CI."
          # Idempotent: create the release, or refresh assets if it already
          # exists (e.g. a manual override re-publishing an existing rev).
          if gh release view "rev${REV}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "rev${REV}" "${FILES[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit   "rev${REV}" --repo "$GITHUB_REPOSITORY" --title "Rev ${REV}" --notes "$NOTES"
          else
            gh release create "rev${REV}" "${FILES[@]}" \
              --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
              --title "Rev ${REV}" --notes "$NOTES"
          fi

          # Self-cleaning: drop any assets not in the current stable set, so a
          # renamed/legacy asset can never linger on the release.
          keep=" ${FILES[*]} "
          gh release view "rev${REV}" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' \
            | while read -r a; do
                [ -n "$a" ] || continue
                case "$keep" in
                  *" $a "*) ;;
                  *) echo "Removing stale asset: $a"
                     gh release delete-asset "rev${REV}" "$a" --yes --repo "$GITHUB_REPOSITORY" ;;
                esac
              done
