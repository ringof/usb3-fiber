name: main-release

# Full fabrication/design package + GitHub Release, with build-time revision
# and git-hash injection. GitHub Releases are the source of truth for the
# current revision: the next alpha letter is computed from the latest release.
#
# Trigger is manual (workflow_dispatch) so a release is a deliberate act rather
# than firing on every merge to main (which would burn through alpha revisions
# on doc-only changes). Provide `revision` to override the auto-increment.

on:
  workflow_dispatch:
    inputs:
      revision:
        description: "Revision letter to publish (blank = auto-increment from latest release)"
        required: false
        default: ""

concurrency:
  group: main-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      revision: ${{ steps.rev.outputs.revision }}
      githash: ${{ steps.rev.outputs.githash }}
    steps:
      - name: Determine revision
        id: rev
        env:
          GH_TOKEN: ${{ github.token }}
          OVERRIDE: ${{ github.event.inputs.revision }}
        run: |
          set -euo pipefail
          if [ -n "$OVERRIDE" ]; then
            next="$OVERRIDE"
          else
            latest=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 \
                       --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
            if [ -z "$latest" ]; then
              next="A"
            else
              letter="${latest#rev}"
              next=$(python3 -c "l='${letter}'.strip(); print('A' if not l else chr(ord(l[-1])+1))")
            fi
          fi
          echo "revision=$next" >> "$GITHUB_OUTPUT"
          echo "githash=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Publishing rev$next (git ${GITHUB_SHA::7})" >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kicad/kicad:10.0
      options: --user root
    env:
      HOME: /root
      REVISION: ${{ needs.prepare.outputs.revision }}
      GIT_HASH: ${{ needs.prepare.outputs.githash }}
    steps:
      - uses: actions/checkout@v6
      - name: Build fab/design package
        run: |
          chmod +x scripts/build_release.sh
          scripts/build_release.sh
      - uses: actions/upload-artifact@v6
        with:
          name: release-package
          path: out/

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-package
          path: out
      - name: Package release assets
        run: |
          set -euo pipefail
          # Stable asset names (no rev/hash) so /releases/latest/download/<name>
          # links stay valid across revisions. Rev + git hash live inside the
          # files (title block / silkscreen) and in the release title/tag.
          cp out/usb3_fiber-schematic.pdf usb3_fiber-schematic.pdf
          ( cd out/gerbers && zip -qr ../../usb3_fiber-gerbers.zip . )
          ( cd out && zip -qr ../usb3_fiber-fabrication.zip . )
          ls -la
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REV: ${{ needs.prepare.outputs.revision }}
          SHA: ${{ needs.prepare.outputs.githash }}
        run: |
          set -euo pipefail
          gh release create "rev${REV}" \
            usb3_fiber-fabrication.zip \
            usb3_fiber-gerbers.zip \
            usb3_fiber-schematic.pdf \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Rev ${REV}" \
            --notes "Fabrication and design package for revision ${REV} (git ${SHA}). Auto-generated by main-release CI."
