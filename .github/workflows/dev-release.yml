name: dev-release

# Pre-release pipeline for the dev lane -- the sibling of main-release.
#
# Runs on every merge to dev. Publishes/refreshes a GitHub *pre-release* only
# when a design file changed since the last release (of any kind); docs / CI /
# script-only merges are a no-op.
#
# Versioning (semver): a minor increment within the CURRENT major line, whose
# major follows the latest PRODUCTION (main) release -- 0 while pre-1.0. The
# first pre-release ever seeds at v0.1; the first pre-release after a main vX.0
# starts at vX.1. This lane does NOT retire at 1.0 -- after main ships 1.0 it
# keeps iterating the 1.x line toward the next production spin (2.0), then 2.x,
# and so on. The policy lives once in scripts/next_version.sh (unit-tested by
# scripts/test_next_version.sh) and is shared with main-release so the two lanes
# can't drift. See docs/RELEASE_STRATEGY.md.
#
# GIT_HASH is stamped from the last commit that touched a design file. Provenance
# is injected at build time only.
#
# Dispatch with dry_run=true to build the package as run artifacts without
# publishing; with version=0.7 to force a specific pre-release number.

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      version:
        description: "Force this pre-release, e.g. 0.7 (blank = automatic minor bump)"
        required: false
        default: ""
      dry_run:
        description: "Build the package + upload as run artifacts, but do NOT publish"
        type: boolean
        required: false
        default: false

concurrency:
  group: dev-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      revision: ${{ steps.rev.outputs.revision }}
      githash: ${{ steps.rev.outputs.githash }}
      publish: ${{ steps.rev.outputs.publish }}
      build: ${{ steps.rev.outputs.build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Determine pre-release version & whether to publish
        id: rev
        env:
          GH_TOKEN: ${{ github.token }}
          OVERRIDE: ${{ github.event.inputs.version }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          # Root board files ONLY -- changes here (and only here) trigger an
          # uprev. Listed explicitly (not '*.kicad_pcb' globs, which match at any
          # depth) so a future sibling project under mechanical/ can't false-
          # trigger a board release. 'library/' + the lib-tables are root-anchored
          # path prefixes; 'library/' covers the .kicad_sym and library/3dmodels/.
          DESIGN=('usb3_fiber.kicad_sch' 'usb3_fiber.kicad_pcb'
                  'usb3_fiber.kicad_pro' 'usb3_fiber.kicad_dru'
                  'library/' 'fp-lib-table' 'sym-lib-table')
          githash=$(git log -1 --format=%h -- "${DESIGN[@]}")

          # All semver releases, newest-first: "<tag> <isPrerelease>". Scoped to
          # v<MAJOR>.<MINOR> so legacy alpha tags (revA/B/C) are ignored. Feeds
          # the shared policy in scripts/next_version.sh.
          releases=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
                       --json tagName,isPrerelease \
                       --jq '.[] | "\(.tagName) \(.isPrerelease)"' 2>/dev/null \
                       | grep -E '^v[0-9]+\.[0-9]+ ' || true)
          # Most recent release of ANY kind = base for change detection.
          latest_tag=$(printf '%s\n' "$releases" | awk 'NF{print $1; exit}')

          changed=""
          if [ -n "${OVERRIDE:-}" ]; then
            revision="$OVERRIDE"; publish=true
            reason="Manual override -> v$revision (pre-release)"
          elif [ -z "$latest_tag" ]; then
            # First release anywhere: seed the pre-release line at v0.1.
            revision=$(printf '%s' "$releases" | bash scripts/next_version.sh dev 0.1)
            publish=true
            reason="No prior release -> seed v$revision (pre-release)"
          else
            base=$(git rev-list -1 "$latest_tag")
            changed=$(git diff --name-only "$base"..HEAD -- "${DESIGN[@]}" || true)
            if [ -n "$changed" ]; then
              revision=$(printf '%s' "$releases" | bash scripts/next_version.sh dev 0.1)
              publish=true
              reason="Design changed since $latest_tag -> v$revision (pre-release)"
            else
              revision="${latest_tag#v}"; publish=false
              reason="No design change since $latest_tag -> no new pre-release (docs / CI-only merge)"
            fi
          fi

          build="$publish"
          if [ "${DRY_RUN:-false}" = "true" ]; then
            publish=false; build=true
            [ -n "$revision" ] || revision="DRYRUN"
            reason="DRY RUN -> build pre-release package for v${revision}, skip publish"
          fi

          {
            echo "revision=$revision"
            echo "githash=$githash"
            echo "publish=$publish"
            echo "build=$build"
          } >> "$GITHUB_OUTPUT"

          echo "$reason (design commit $githash)." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$changed" ]; then
            { echo '```'; echo "$changed"; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.build == 'true'
    runs-on: ubuntu-latest
    container:
      # Pinned in-house CI image: INTI-CMNB kicad10_auto + PyMuPDF (for framed
      # drill maps). Pinned tag (not :latest) keeps release output reproducible.
      image: ghcr.io/ringof/kicad-ci:10-20260704
      options: --user root
    env:
      HOME: /root
      REVISION: ${{ needs.prepare.outputs.revision }}
      GIT_HASH: ${{ needs.prepare.outputs.githash }}
    steps:
      - uses: actions/checkout@v6
      - name: Build fab/design package
        run: |
          chmod +x scripts/build_release.sh
          scripts/build_release.sh
      - uses: actions/upload-artifact@v6
        with:
          name: release-package
          path: out/

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-package
          path: out
      - name: Package release assets
        run: |
          set -euo pipefail
          # Stable asset names (no version/hash in the filename), same set as the
          # production lane. docs/ comes from gen_docs.sh (framed kicad-cli PDFs);
          # JLCPCB/gerbers/ from KiBot.
          cp out/docs/usb3_fiber-schematic.pdf           usb3_fiber-schematic.pdf
          cp out/docs/usb3_fiber-assembly.pdf            usb3_fiber-assembly.pdf
          cp out/docs/usb3_fiber-fabrication-drawing.pdf usb3_fiber-fabrication-drawing.pdf
          ( cd out/JLCPCB/gerbers && zip -qr ../../../usb3_fiber-gerbers.zip . )
          ( cd out && zip -qr ../usb3_fiber-fabrication.zip . )
          ls -la
      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          REV: ${{ needs.prepare.outputs.revision }}
          SHA: ${{ needs.prepare.outputs.githash }}
        run: |
          set -euo pipefail
          FILES=(usb3_fiber-fabrication.zip usb3_fiber-gerbers.zip usb3_fiber-schematic.pdf
                 usb3_fiber-assembly.pdf usb3_fiber-fabrication-drawing.pdf)
          NOTES="Pre-release fabrication and design package for v${REV} (design commit ${SHA}). Auto-generated by dev-release CI."
          # Idempotent: create the pre-release, or refresh assets if it already
          # exists (e.g. a manual override re-publishing an existing version).
          if gh release view "v${REV}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "v${REV}" "${FILES[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit   "v${REV}" --repo "$GITHUB_REPOSITORY" --prerelease \
              --title "v${REV} (pre-release)" --notes "$NOTES"
          else
            gh release create "v${REV}" "${FILES[@]}" \
              --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --prerelease \
              --title "v${REV} (pre-release)" --notes "$NOTES"
          fi

          # Self-cleaning: drop any assets not in the current stable set, so a
          # renamed/legacy asset can never linger on the release.
          keep=" ${FILES[*]} "
          gh release view "v${REV}" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' \
            | while read -r a; do
                [ -n "$a" ] || continue
                case "$keep" in
                  *" $a "*) ;;
                  *) echo "Removing stale asset: $a"
                     gh release delete-asset "v${REV}" "$a" --yes --repo "$GITHUB_REPOSITORY" ;;
                esac
              done
