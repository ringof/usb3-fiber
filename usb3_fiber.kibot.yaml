# KiBot pipeline for usb3_fiber — fab-agnostic base, JLCPCB turnkey profile.
#
# Provenance (title-block rev + GIT_HASH) is injected by
# scripts/inject_provenance.py BEFORE kibot runs; this file only *generates*.
# See docs/TURNKEY.md for the design rationale.
#
# Output dirs (relative to the -d/--out-dir passed on the CLI):
#   docs/          schematic PDF, assembly drawings, iBOM   (dev + release)
#   fab/           STEP, 3D renders                          (release)
#   JLCPCB/        CPL (rotation-corrected), LCSC BOM        (release)
#   JLCPCB/gerbers gerbers + drill (the board-fab upload)    (release)
kibot:
  version: 1

# --- Gate checks run as preflights (ERC/DRC honor the project rules) ----------
# The workflows decide whether these gate (ENFORCE) by choosing to run or skip
# preflights; the definitions live here so both dev and release share them.
preflight:
  erc: true
  drc: true
  update_xml: true

# --- Variants -----------------------------------------------------------------
# `rotated` applies KiBot's JLCPCB rotation database via the _rot_footprint
# transform, so the CPL matches how JLCPCB's placement machines orient parts.
# Per-part nudges via a `JLCRotOffset` field; no global table to maintain.
variants:
  - name: rotated
    comment: 'JLCPCB rotation-corrected placement'
    type: kibom
    variant: rotated
    pre_transform: _rot_footprint

# --- Reusable filters ---------------------------------------------------------
filters:
  - name: only_jlc_parts
    comment: 'Only parts with an LCSC number (orderable turnkey)'
    type: generic
    include_only:
      - column: LCSC
        regex: '^C\d+'

# --- Outputs ------------------------------------------------------------------
outputs:
  # ---- docs (dev checks + release) ----
  # Every worksheet-bearing output names its sheet EXPLICITLY via
  # sheet_reference_layout, so CI never depends on the project's
  # page_layout_descr_file. KiCad is free to blank / embed / rewrite the local
  # sheet setting — CI still renders the correct frame from the .kicad_wks file
  # on disk. Do not remove these overrides.
  - name: schematic_pdf
    comment: 'Schematic (PDF)'
    type: pdf_sch_print
    dir: docs
    options:
      output: usb3_fiber-schematic.pdf
      sheet_reference_layout: usb3_fiber-sch.kicad_wks

  # Two documentation PDFs, both on the PCB worksheet (usb3_fiber-fab.kicad_wks).
  # Dwgs.User / Cmts.User ride on the relevant pages, so dimensions, notes, and
  # KiCad-placed stackup / board-characteristics tables drawn on those layers in
  # the board editor render automatically — the layer-driven way KiCad
  # approximates a Draftsman document.

  # 1) Assembly — top + bottom in one PDF (what a placement operator reads).
  - name: assembly_docs
    comment: 'Assembly drawings (top + bottom)'
    type: pcb_print
    dir: docs
    options:
      output: usb3_fiber-assembly.pdf
      format: PDF
      plot_sheet_reference: true
      sheet_reference_layout: usb3_fiber-fab.kicad_wks
      pages:
        - layers:
            - layer: F.Fab
            - layer: F.Silkscreen
            - layer: Edge.Cuts
            - layer: Dwgs.User
            - layer: Cmts.User
          sheet: 'Assembly — Top'
        - layers:
            - layer: B.Fab
            - layer: B.Silkscreen
            - layer: Edge.Cuts
            - layer: Dwgs.User
            - layer: Cmts.User
          mirror: true
          sheet: 'Assembly — Bottom'

  # 2) Fabrication — notes/stackup drawing, a monochrome page per copper layer,
  #    and a drill map (auto-generated per drill pair). drill_marks show hole
  #    positions on every page.
  - name: fab_docs
    comment: 'Fabrication drawings (notes, copper, drill)'
    type: pcb_print
    dir: docs
    options:
      output: usb3_fiber-fabrication-drawing.pdf
      format: PDF
      plot_sheet_reference: true
      sheet_reference_layout: usb3_fiber-fab.kicad_wks
      drill_marks: full
      pages:
        # Fab/notes drawing: outline + user-layer content. User.1 ("Fab Notes")
        # carries the Board Characteristics table (fab-only, so it stays off the
        # assembly pages); Dwgs.User/Cmts.User carry dimensions and notes.
        - layers:
            - layer: Edge.Cuts
            - layer: Dwgs.User
            - layer: Cmts.User
            - layer: User.1
          sheet: 'Fabrication Drawing'
        # One monochrome page per copper layer (F.Cu, In1.Cu, In2.Cu, B.Cu).
        - layers:
            - layer: F.Cu
            - layer: Edge.Cuts
          repeat_for_layer: F.Cu
          repeat_layers: copper
          monochrome: true
          sheet: 'Copper — %ln'
        # Drill map, one page per drill pair, drawn on a user layer.
        - layers:
            - layer: Edge.Cuts
            - layer: Dwgs.User
          repeat_for_layer: Dwgs.User
          repeat_layers: drill_pairs
          sheet: 'Drill Map — %lpn'

  - name: ibom
    comment: 'Interactive HTML BOM'
    type: ibom
    dir: docs
    options:
      dark_mode: true
      extra_fields: 'LCSC,Manufacturer,Manufacturer Part Number'

  # ---- fab (release) ----
  - name: step
    comment: '3D model (STEP)'
    type: step
    dir: fab
    options:
      output: usb3_fiber.step

  - name: render_top
    comment: '3D render — top'
    type: render_3d
    dir: fab
    options:
      output: usb3_fiber-3d-top.png
      ray_tracing: false
      view: top

  - name: render_bottom
    comment: '3D render — bottom'
    type: render_3d
    dir: fab
    options:
      output: usb3_fiber-3d-bottom.png
      ray_tracing: false
      view: bottom

  # ---- JLCPCB turnkey (release) ----
  - name: JLCPCB_gerbers
    comment: 'Gerbers (JLCPCB profile)'
    type: gerber
    dir: JLCPCB/gerbers
    options:
      exclude_edge_layer: true
      exclude_pads_from_silkscreen: true
      plot_sheet_reference: false
      plot_footprint_refs: true
      plot_footprint_values: false
      force_plot_invisible_refs_vals: false
      tent_vias: true
      use_protel_extensions: true
      create_gerber_job_file: false
      disable_aperture_macros: true
      gerber_precision: 4.6
      use_gerber_x2_attributes: false
      use_gerber_net_attributes: false
      line_width: 0.1
      subtract_mask_from_silk: true
      inner_extension_pattern: '.g%n'
    layers:
      - F.Cu
      - In1.Cu
      - In2.Cu
      - B.Cu
      - F.SilkS
      - B.SilkS
      - F.Mask
      - B.Mask
      - Edge.Cuts

  - name: JLCPCB_drill
    comment: 'Drill files (JLCPCB profile)'
    type: excellon
    dir: JLCPCB/gerbers
    options:
      pth_and_npth_single_file: false
      pth_id: '-PTH'
      npth_id: '-NPTH'
      metric_units: true
      map: gerber
      route_mode_for_oval_holes: false
      output: '%f%i.%x'

  - name: JLCPCB_position
    comment: 'CPL / placement (rotation-corrected)'
    type: position
    dir: JLCPCB
    options:
      variant: rotated
      output: usb3_fiber-cpl.csv
      format: CSV
      units: millimeters
      separate_files_for_front_and_back: false
      only_smd: false
      columns:
        - id: Ref
          name: Designator
        - Val
        - Package
        - id: PosX
          name: 'Mid X'
        - id: PosY
          name: 'Mid Y'
        - id: Rot
          name: Rotation
        - id: Side
          name: Layer

  - name: JLCPCB_bom
    comment: 'BOM (LCSC / JLCPCB)'
    type: bom
    dir: JLCPCB
    options:
      output: usb3_fiber-bom.csv
      exclude_filter: only_jlc_parts
      ref_separator: ','
      columns:
        - field: Value
          name: Comment
        - field: References
          name: Designator
        - Footprint
        - field: LCSC
          name: 'LCSC Part #'
      csv:
        hide_pcb_info: true
        hide_stats_info: true
        quote_all: true
